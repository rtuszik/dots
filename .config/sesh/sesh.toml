[default_session]
startup_command = ""
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "tmux config"
path = "~/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/.config/tmux/tmux.conf"

[[session]]
name = "nvim config"
path = "~/.config/nvim"
startup_command = "nvim ."
preview_command = "bat --color=always ~/.config/nvim/init.lua"

[[session]]
name = "dot config"
path = "~/.config/"
startup_command = "yazi"

## Windows
[[window]]
name = "lazygit"
startup_script = "lazygit"

[[window]]
name = "k9s"
startup_script = "k9s"

[[window]]
name = "neovim"
startup_script = "n"
